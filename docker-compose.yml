version: '3.8'

services:
  beacon-guard:
    build:
      context: .
      dockerfile: Dockerfile
    privileged: true
    pid: host
    network_mode: host
    volumes:
      - /sys/kernel/debug:/sys/kernel/debug:rw
      - ./config.json:/app/config.json:ro
    environment:
      - BEACON_CONFIG=/app/config.json
    restart: unless-stopped
    cap_add:
      - BPF
      - SYS_ADMIN
      - SYS_PTRACE
      - NET_ADMIN

  api:
    build:
      context: api
      dockerfile: Dockerfile
    ports:
      - "9091:9091"
    environment:
      - GO_LOADER_URL=http://beacon-guard:9090
    restart: unless-stopped

  frontend:
    build:
      context: frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API=http://localhost:9091
    depends_on:
      - api
    restart: unless-stopped
